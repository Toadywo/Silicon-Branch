<section class="hero-section">
  <h1>Welcome to Silicon Branch</h1>
  <p>Providing tech news and clearance since 2026!</p>
</section>

<div class="container">
  <section class="featured-stories">
    <h2 class="section-title">Featured Stories</h2>
    
    <div class="article-grid">
      @for (article of articles.slice(0, 3); track article.id) {
        <div class="article-card" [routerLink]="['/article', article.id]">
          <div class="card-image">
            <img [src]="article.thumbnail" alt="{{article.title}}">
          </div>
          <div class="card-content">
            <h3>{{ article.title }}</h3>
            <p>{{ article.summary }}</p>
          </div>
        </div>
      }
    </div>
  </section>
</div>
